[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Trailing slash redirects — Astro adds trailing slashes; make sure non-trailing redirects to canonical
[[redirects]]
  from = "/home-theater-installation-san-antonio-tx"
  to = "/home-theater-installation-san-antonio-tx/"
  status = 301

[[redirects]]
  from = "/whole-house-audio-san-antonio"
  to = "/whole-house-audio-san-antonio/"
  status = 301

[[redirects]]
  from = "/outdoor-audio-video-san-antonio"
  to = "/outdoor-audio-video-san-antonio/"
  status = 301

[[redirects]]
  from = "/surround-sound-installation-san-antonio"
  to = "/surround-sound-installation-san-antonio/"
  status = 301

[[redirects]]
  from = "/security-camera-installation-san-antonio"
  to = "/security-camera-installation-san-antonio/"
  status = 301

[[redirects]]
  from = "/av-repair-san-antonio-tx"
  to = "/av-repair-san-antonio-tx/"
  status = 301

[[redirects]]
  from = "/av-partner-for-home-builders-san-antonio"
  to = "/av-partner-for-home-builders-san-antonio/"
  status = 301

[[redirects]]
  from = "/about-kz-audio-video"
  to = "/about-kz-audio-video/"
  status = 301

[[redirects]]
  from = "/home-theater-projects-san-antonio"
  to = "/home-theater-projects-san-antonio/"
  status = 301

[[redirects]]
  from = "/faq-home-theater-av-installation-san-antonio"
  to = "/faq-home-theater-av-installation-san-antonio/"
  status = 301

[[redirects]]
  from = "/contact-kz-audio-video-san-antonio-tx"
  to = "/contact-kz-audio-video-san-antonio-tx/"
  status = 301

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache images aggressively
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache fonts
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
